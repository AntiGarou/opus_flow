name: soundflow
description: "OpusFlow — aggregated music streaming with Material 3 design"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  just_audio: ^0.9.42
  audio_service: ^0.18.15
  cached_network_image: ^3.4.1
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  shimmer: ^3.0.0
  html: ^0.15.5
  rxdart: ^0.28.0
  crypto: ^3.0.6
  share_plus: ^10.1.2
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
