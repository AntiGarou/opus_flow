name: Android Release APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YANDEX_OAUTH_TOKEN: ${{ secrets.YANDEX_OAUTH_TOKEN }}
          JAMENDO_CLIENT_ID: ${{ secrets.JAMENDO_CLIENT_ID }}
        run: |
          flutter build apk --release \
            --dart-define=SPOTIFY_CLIENT_ID="${SPOTIFY_CLIENT_ID}" \
            --dart-define=SPOTIFY_CLIENT_SECRET="${SPOTIFY_CLIENT_SECRET}" \
            --dart-define=YANDEX_OAUTH_TOKEN="${YANDEX_OAUTH_TOKEN}" \
            --dart-define=JAMENDO_CLIENT_ID="${JAMENDO_CLIENT_ID}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: soundflow-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
